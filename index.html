<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Panda Universe - The Ink of Reality (300x Detail)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: Arial, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* 힌트 텍스트 */
        #hint {
            position: fixed; bottom: 40px; width: 100%; text-align: center;
            color: #fff; font-size: 12px; letter-spacing: 6px; font-weight: 300;
            z-index: 10; pointer-events: none; mix-blend-mode: difference; transition: opacity 1s;
        }

        /* 에러 감지용 긴급 로그 창 */
        #error-log {
            position: fixed; top: 0; left: 0; background: rgba(255,0,0,0.8);
            color: #fff; z-index: 9999; font-family: monospace; padding: 10px; display: none;
        }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <div id="hint">CLICK AND DRAG TO SPREAD THE INK</div>
    
    <canvas id="mask-canvas" style="display: none;"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="megaShader" type="x-shader/x-fragment">
        uniform float uTime;
        uniform vec2 uResolution;
        uniform sampler2D tMask;

        // --- 1. 절차적 노이즈 함수 (fBM) ---
        mat2 rot(float a) {
            float s = sin(a), c = cos(a);
            return mat2(c, -s, s, c);
        }
        
        float hash(vec2 p) {
            return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
        }
        
        float noise(vec2 p) {
            vec2 i = floor(p); vec2 f = fract(p);
            vec2 u = f * f * (3.0 - 2.0 * f);
            return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                       mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
        }
        
        float fbm(vec2 p) {
            float f = 0.0;
            f += 0.5000 * noise(p); p = rot(0.5) * p * 2.02;
            f += 0.2500 * noise(p); p = rot(0.3) * p * 2.03;
            f += 0.1250 * noise(p); p = rot(0.1) * p * 2.01;
            f += 0.0625 * noise(p);
            return f;
        }

        void main() {
            // 정규화된 UV 좌표 (비율 보정)
            vec2 uv = gl_FragCoord.xy / uResolution.xy;
            vec2 centeredUv = (gl_FragCoord.xy - 0.5 * uResolution.xy) / min(uResolution.x, uResolution.y);
            float t = uTime * 0.5;

            // --- 2. 캔버스 마스크 데이터 읽기 ---
            // 마스크 캔버스에서 투명도(Alpha)를 읽어와 잉크 영역(0~1) 계산
            float maskAlpha = texture2D(tMask, uv).a; 
            float inkVal = 1.0 - maskAlpha; // 잉크가 묻은 곳은 1.0

            // --- 3. 블랙홀 & 중력 렌즈 렌더링 ---
            float dist = length(centeredUv);
            vec2 warpedUv = centeredUv;
            
            // 시공간이 휘어지는 중력 렌즈 공식
            float blackHoleMass = 0.04;
            if(dist > 0.0) {
                float warp = blackHoleMass / (dist * dist + 0.005);
                warpedUv = centeredUv + normalize(centeredUv) * warp;
            }

            vec3 cosmicCol = vec3(0.0);

            // A. 심연의 네뷸라 (배경 가스)
            float nebNoise1 = fbm(warpedUv * 3.0 + vec2(t * 0.1, t * 0.05));
            float nebNoise2 = fbm(warpedUv * 5.0 - vec2(t * 0.08, t * 0.04));
            vec3 nebBase = mix(vec3(0.02, 0.05, 0.15), vec3(0.4, 0.02, 0.2), nebNoise1);
            cosmicCol += nebBase * nebNoise2 * 2.0;

            // B. 가스 원반 (Accretion Disk)
            vec2 diskUv = warpedUv;
            diskUv.y *= 3.8; // 원반 눕히기
            float diskDist = length(diskUv);
            
            float diskAlpha = smoothstep(0.8, 0.25, diskDist) * smoothstep(0.18, 0.22, diskDist);
            
            float angle = atan(diskUv.y, diskUv.x);
            vec2 polarUv = vec2(angle * 2.5 - t * 4.0, diskDist * 8.0 - t * 1.5);
            float gasFlow = fbm(polarUv * 3.0);
            float gasDetail = fbm(polarUv * 10.0 + vec2(t));
            
            float gasDensity = diskAlpha * gasFlow * (0.4 + 0.6 * gasDetail);
            
            vec3 coreCol = vec3(1.0, 0.9, 0.8);
            vec3 midCol  = vec3(1.0, 0.4, 0.05);
            vec3 edgeCol = vec3(0.5, 0.05, 0.0);
            
            vec3 diskColor = mix(edgeCol, midCol, smoothstep(0.0, 0.5, gasDensity));
            diskColor = mix(diskColor, coreCol, smoothstep(0.5, 1.0, gasDensity));
            
            cosmicCol += diskColor * gasDensity * 12.0; // 발광(Bloom)

            // C. 사건의 지평선 (Event Horizon)
            float eventHorizon = smoothstep(0.19, 0.175, dist);
            cosmicCol = mix(cosmicCol, vec3(0.0), eventHorizon); 
            
            float photonRing = smoothstep(0.23, 0.175, dist) * smoothstep(0.13, 0.175, dist);
            cosmicCol += vec3(1.0, 0.7, 0.3) * photonRing * 4.0; 

            // --- 4. 잉크 번짐 텍스처 조합 ---
            float paperGrain = fbm(uv * 100.0) * 0.05;
            vec3 paperCol = vec3(0.92 + paperGrain);

            float edgeDistort = fbm(uv * 15.0 - vec2(t * 0.3));
            float edgeDistort2 = fbm(uv * 35.0 + vec2(t * 0.5));
            
            float organicInk = inkVal + (edgeDistort * 0.6 + edgeDistort2 * 0.3) * inkVal;
            
            float revealAlpha = smoothstep(0.3, 0.6, organicInk);
            
            float inkEdge = smoothstep(0.1, 0.4, organicInk) - smoothstep(0.4, 0.6, organicInk);
            vec3 inkColor = vec3(0.02, 0.0, 0.05); 
            
            vec3 finalColor = mix(paperCol, inkColor, inkEdge * 2.5); 
            finalColor = mix(finalColor, cosmicCol, revealAlpha);     

            finalColor *= 1.0 - length(centeredUv) * 0.3;
            gl_FragColor = vec4(max(finalColor, 0.0), 1.0);
        }
    </script>

    <script>
        // 에러 감지기
        window.onerror = function(msg, url, line) {
            let err = document.getElementById('error-log');
            err.style.display = 'block';
            err.innerHTML += msg + ' (Line: ' + line + ')<br>';
            return false;
        };

        // --- 전역 변수 선언 ---
        let scene, camera, renderer;
        let megaMaterial, maskTexture;
        let maskCanvas, maskCtx;
        
        let isDrawing = false;
        let inkDrops = [];
        let lastX = 0, lastY = 0;

        // [에러 해결 포인트!] clock을 가장 먼저 선언합니다.
        const clock = new THREE.Clock();

        // 초기화 및 애니메이션 실행
        init();
        animate();

        function init() {
            // 1. 숨겨진 마스크 캔버스 세팅
            maskCanvas = document.getElementById('mask-canvas');
            maskCanvas.width = window.innerWidth;
            maskCanvas.height = window.innerHeight;
            maskCtx = maskCanvas.getContext('2d');
            
            drawInitialCanvas();

            maskTexture = new THREE.CanvasTexture(maskCanvas);
            maskTexture.minFilter = THREE.LinearFilter;

            // 2. Three.js 기본 셋업
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            // 3. 메가 쉐이더 매핑
            megaMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                    tMask: { value: maskTexture }
                },
                vertexShader: `void main() { gl_Position = vec4(position, 1.0); }`,
                fragmentShader: document.getElementById('megaShader').textContent,
                depthWrite: false,
                depthTest: false
            });

            const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), megaMaterial);
            scene.add(quad);

            // 4. 이벤트 리스너
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', onPointerDown);
            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('mouseup', onPointerUp);
            document.addEventListener('touchstart', (e) => { e.preventDefault(); onPointerDown(e.touches[0]); }, { passive: false });
            document.addEventListener('touchmove', (e) => { e.preventDefault(); onPointerMove(e.touches[0]); }, { passive: false });
            document.addEventListener('touchend', onPointerUp);
        }

        function drawInitialCanvas() {
            maskCtx.globalCompositeOperation = 'source-over';
            maskCtx.fillStyle = '#000000'; 
            maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
            
            maskCtx.globalCompositeOperation = 'destination-out';
            maskCtx.fillStyle = 'rgba(0, 0, 0, 0.4)'; 
            maskCtx.textAlign = 'center'; 
            maskCtx.textBaseline = 'middle';
            
            const mainSize = Math.min(window.innerWidth * 0.08, 120);
            const subSize = Math.min(window.innerWidth * 0.02, 24);
            
            maskCtx.font = `900 ${mainSize}px Arial, sans-serif`;
            maskCtx.fillText('PANDA UNIVERSE', maskCanvas.width/2, maskCanvas.height/2 - 20);
            
            maskCtx.font = `bold ${subSize}px Arial, sans-serif`;
            maskCtx.fillText('3D MOTION GRAPHICS & MEDIA ART', maskCanvas.width/2, maskCanvas.height/2 + mainSize * 0.6);
        }

        // --- 잉크 번짐 역학 ---
        function addInkDrop(x, y, power) {
            document.getElementById('hint').style.opacity = '0';
            inkDrops.push({
                x: x, y: y,
                radius: 1,
                maxRadius: (80 + Math.random() * 150) * power,
                life: 1.0 
            });
        }

        function processInkDrops() {
            if (inkDrops.length === 0) return;
            
            maskCtx.globalCompositeOperation = 'destination-out'; 
            let isUpdated = false;

            for (let i = inkDrops.length - 1; i >= 0; i--) {
                let drop = inkDrops[i];
                let currentRadius = Math.max(0.1, drop.radius); 
                
                let grad = maskCtx.createRadialGradient(drop.x, drop.y, 0, drop.x, drop.y, currentRadius);
                grad.addColorStop(0, `rgba(0, 0, 0, ${drop.life})`);
                grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                maskCtx.beginPath();
                maskCtx.fillStyle = grad;
                maskCtx.arc(drop.x, drop.y, currentRadius, 0, Math.PI * 2);
                maskCtx.fill();

                drop.radius += (drop.maxRadius - drop.radius) * 0.08; 
                drop.life -= 0.015; 

                if (drop.life <= 0) inkDrops.splice(i, 1);
                isUpdated = true;
            }
            
            if(isUpdated) maskTexture.needsUpdate = true; 
        }

        // --- 인터랙션 제어 ---
        function onPointerDown(e) {
            isDrawing = true;
            lastX = e.clientX; lastY = e.clientY;
            addInkDrop(lastX, lastY, 2.0); 
        }

        function onPointerMove(e) {
            if (!isDrawing) return;
            const dist = Math.hypot(e.clientX - lastX, e.clientY - lastY);
            if (dist > 15) { 
                addInkDrop(e.clientX, e.clientY, 0.8 + Math.random() * 0.7);
                lastX = e.clientX; lastY = e.clientY;
            }
        }
        
        function onPointerUp() { isDrawing = false; }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            megaMaterial.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
            
            let tempCanvas = document.createElement('canvas');
            tempCanvas.width = maskCanvas.width; tempCanvas.height = maskCanvas.height;
            tempCanvas.getContext('2d').drawImage(maskCanvas, 0, 0);
            
            maskCanvas.width = window.innerWidth; maskCanvas.height = window.innerHeight;
            maskCtx.fillStyle = '#000000'; maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
            maskCtx.drawImage(tempCanvas, 0, 0, tempCanvas.width, tempCanvas.height);
            maskTexture.needsUpdate = true;
        }

        // --- 렌더링 루프 ---
        function animate() {
            requestAnimationFrame(animate);
            
            processInkDrops();
            megaMaterial.uniforms.uTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
