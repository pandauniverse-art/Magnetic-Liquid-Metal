<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Panda Universe - The Ink of Reality (Cinematic)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Helvetica Neue', Arial, sans-serif; touch-action: none; }
        canvas { display: block; }
        /* 에러 로그 */
        #error-log { position: fixed; top: 0; left: 0; background: rgba(255,0,0,0.8); color: #fff; z-index: 9999; font-family: monospace; padding: 10px; display: none; }
        /* 안내 문구 */
        #hint { position: fixed; bottom: 40px; width: 100%; text-align: center; color: #fff; font-size: 11px; letter-spacing: 5px; font-weight: 300; z-index: 10; pointer-events: none; opacity: 0.5; mix-blend-mode: difference; }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <div id="hint">CLICK AND DRAG TO SPREAD THE INK</div>

    <canvas id="mask-canvas" style="display:none;"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="blackHoleShader" type="x-shader/x-fragment">
        uniform float uTime;
        uniform vec2 uResolution;
        varying vec2 vUv;

        // 고급 프랙탈 노이즈 (fBM)
        mat2 m = mat2( 0.80,  0.60, -0.60,  0.80 );
        float hash( float n ) { return fract(sin(n)*43758.5453); }
        float noise( in vec2 x ) {
            vec2 p = floor(x); vec2 f = fract(x);
            f = f*f*(3.0-2.0*f); float n = p.x + p.y*57.0;
            return mix(mix( hash(n+  0.0), hash(n+  1.0),f.x), mix( hash(n+ 57.0), hash(n+ 58.0),f.x),f.y);
        }
        float fbm( vec2 p ) {
            float f = 0.0;
            f += 0.50000*noise( p ); p = m*p*2.02;
            f += 0.25000*noise( p ); p = m*p*2.03;
            f += 0.12500*noise( p ); p = m*p*2.01;
            f += 0.06250*noise( p ); p = m*p*2.04;
            f += 0.03125*noise( p );
            return f/0.96875;
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution.xy) / min(uResolution.y, uResolution.x);
            float t = uTime * 0.5;

            // 1. 중력 렌즈 효과 (Gravitational Lensing)
            float dist = length(uv);
            float mass = 0.04; // 블랙홀 질량
            vec2 warpedUv = uv;
            if(dist > 0.0) {
                float warp = mass / (dist * dist + 0.01);
                warpedUv = uv + normalize(uv) * warp;
            }

            vec3 col = vec3(0.0);

            // 2. 심연의 배경 네뷸라 (퍼플 & 블루)
            float nebNoise = fbm(warpedUv * 3.0 + vec2(t*0.1, t*0.05));
            float nebNoise2 = fbm(warpedUv * 5.0 - vec2(t*0.08, t*0.04));
            vec3 nebColor = mix(vec3(0.05, 0.1, 0.3), vec3(0.4, 0.05, 0.3), nebNoise);
            col += nebColor * nebNoise2 * 1.5;

            // 3. 은하수 별빛 (가스에 가려진 별)
            float starNoise = hash(floor(warpedUv.x * 500.0) + floor(warpedUv.y * 500.0) * 113.0);
            if(starNoise > 0.99) col += vec3(1.0) * (starNoise - 0.99) * 100.0 * (0.5 + 0.5*sin(uTime*5.0 + starNoise*100.0));

            // 4. 가스 원반 (Accretion Disk) - 옥테인 랜더 스타일의 주황/황금빛 가스
            // 기울어진 원반을 위한 타원형 거리 계산
            vec2 diskUv = warpedUv;
            diskUv.y *= 3.5; // 기울기 부여
            float diskDist = length(diskUv);
            
            // 안쪽과 바깥쪽 경계 설정
            float diskAlpha = smoothstep(0.8, 0.3, diskDist) * smoothstep(0.2, 0.25, diskDist);
            
            // 가스의 흐름 노이즈
            float angle = atan(diskUv.y, diskUv.x);
            vec2 polarUv = vec2(angle * 2.0 - t * 3.0, diskDist * 5.0 - t);
            float gasNoise = fbm(polarUv * 3.0);
            float gasNoise2 = fbm(polarUv * 8.0 + vec2(t));
            
            float diskDensity = diskAlpha * gasNoise * (0.5 + 0.5 * gasNoise2);
            
            // 섭씨 1만도 이상의 발광 컬러 매핑
            vec3 coreColor = vec3(1.0, 1.0, 0.9);
            vec3 midColor = vec3(1.0, 0.5, 0.1);
            vec3 edgeColor = vec3(0.6, 0.1, 0.0);
            
            vec3 diskColor = mix(edgeColor, midColor, smoothstep(0.0, 0.5, diskDensity));
            diskColor = mix(diskColor, coreColor, smoothstep(0.5, 1.0, diskDensity));
            
            // 발광 증폭 (Bloom 전단계)
            col += diskColor * diskDensity * 8.0;

            // 5. 사건의 지평선 (Event Horizon - 완벽한 어둠)
            float eventHorizon = smoothstep(0.18, 0.17, dist);
            col = mix(col, vec3(0.0), eventHorizon);

            // 주변부 글로우 (Photon Ring)
            float photonRing = smoothstep(0.22, 0.17, dist) * smoothstep(0.14, 0.17, dist);
            col += vec3(1.0, 0.8, 0.5) * photonRing * 3.0;

            // 비네팅 (가장자리 어둡게)
            col *= 1.0 - length(uv) * 0.5;

            gl_FragColor = vec4(pow(col, vec3(1.0/2.2)), 1.0); // 감마 콜렉션
        }
    </script>

    <script id="inkMaskShader" type="x-shader/x-fragment">
        uniform sampler2D tBackground; // 렌더링된 3D 우주
        uniform sampler2D tMask;       // 마우스로 그린 캔버스
        uniform float uTime;
        varying vec2 vUv;

        // 잉크 가장자리용 하이프리퀀시 노이즈
        float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
        float noise(vec2 p) {
            vec2 i = floor(p); vec2 f = fract(p);
            vec2 u = f * f * (3.0 - 2.0 * f);
            return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                       mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
        }
        float fbm(vec2 p) {
            float f = 0.0;
            f += 0.5000 * noise(p); p *= 2.02;
            f += 0.2500 * noise(p); p *= 2.03;
            f += 0.1250 * noise(p); p *= 2.01;
            f += 0.0625 * noise(p);
            return f;
        }

        void main() {
            vec4 bgCol = texture2D(tBackground, vUv);
            float maskVal = texture2D(tMask, vUv).r; // 캔버스의 밝기값
            
            // 전경: 하얀색 종이 질감 살짝
            float paperNoise = noise(vUv * 500.0) * 0.05;
            vec3 fgCol = vec3(0.95 + paperNoise); 

            // 잉크가 스며드는 경계면 생성 로직
            // 캔버스에서 그린 둥근 브러시에 fBM 노이즈를 더해 거칠고 유기적인 먹물 테두리를 만듦
            float edgeNoise = fbm(vUv * 15.0 - vec2(uTime * 0.2));
            float edgeNoise2 = fbm(vUv * 40.0 + vec2(uTime * 0.1));
            
            // maskVal이 0보다 크면 번짐 시작
            float threshold = maskVal + (edgeNoise * 0.4 + edgeNoise2 * 0.2) * maskVal;
            
            // 잉크 번짐의 알파(투명도) 결정
            float alpha = smoothstep(0.2, 0.5, threshold);
            
            // 경계선(먹물이 타들어가는 엣지)에 타는 듯한 짙은 잉크색 추가
            float burnEdge = smoothstep(0.2, 0.4, threshold) - smoothstep(0.4, 0.5, threshold);
            vec3 inkBurnColor = vec3(0.05, 0.0, 0.1); // 진한 먹색/보라색
            
            vec3 finalColor = mix(fgCol, inkBurnColor, burnEdge * 1.5);
            finalColor = mix(finalColor, bgCol.rgb, alpha);

            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script>
        window.onerror = function(msg, url, line) {
            let err = document.getElementById('error-log');
            err.style.display = 'block';
            err.innerHTML += msg + ' (Line: ' + line + ')<br>';
            return false;
        };

        let scene, camera, renderer;
        let bgRenderTarget;
        let blackHoleMaterial;
        let finalMaterial, finalScene, finalCamera;
        
        let maskCanvas, maskCtx, maskTexture;
        let isDrawing = false;
        let lastX = 0, lastY = 0;

        // 잉크 번짐 파티클 관리 배열
        const inkDrops = [];

        init();
        animate();

        function init() {
            // ----------------------------------------------------
            // 1. 마스크 캔버스 셋업 (잉크 데이터용)
            // ----------------------------------------------------
            maskCanvas = document.getElementById('mask-canvas');
            maskCanvas.width = window.innerWidth;
            maskCanvas.height = window.innerHeight;
            maskCtx = maskCanvas.getContext('2d');
            
            // 검은색 바탕(안보임)에 하얀색(보임)으로 마스킹
            maskCtx.fillStyle = '#000000';
            maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
            
            // 타이포그래피 (검은색 바디에서 하얀색 글씨로 구멍을 냄)
            maskCtx.fillStyle = 'rgba(255, 255, 255, 0.05)'; // 글씨에서 은은하게 우주가 비치게
            maskCtx.textAlign = 'center'; maskCtx.textBaseline = 'middle';
            maskCtx.font = '900 min(8vw, 120px) "Helvetica Neue", Arial, sans-serif';
            maskCtx.fillText('PANDA UNIVERSE', maskCanvas.width/2, maskCanvas.height/2 - 20);
            maskCtx.font = 'bold min(2vw, 24px) "Helvetica Neue", Arial, sans-serif';
            maskCtx.fillText('3D MOTION GRAPHICS & MEDIA ART', maskCanvas.width/2, maskCanvas.height/2 + 60);

            maskTexture = new THREE.CanvasTexture(maskCanvas);
            maskTexture.minFilter = THREE.LinearFilter;

            // ----------------------------------------------------
            // 2. WebGL 기본 셋업
            // ----------------------------------------------------
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 배경(우주)을 오프스크린 렌더링하기 위한 타겟 생성
            bgRenderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);

            // ----------------------------------------------------
            // 3. 우주 씬 (Background Scene) 셋업
            // ----------------------------------------------------
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1); // 2D 평면 카메라

            // 화면을 가득 채우는 블랙홀 커스텀 쉐이더 매테리얼
            blackHoleMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
                },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
                fragmentShader: document.getElementById('blackHoleShader').textContent
            });
            const bgPlane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), blackHoleMaterial);
            scene.add(bgPlane);

            // ----------------------------------------------------
            // 4. 최종 렌더링 씬 (Foreground Masking Scene)
            // ----------------------------------------------------
            finalScene = new THREE.Scene();
            finalCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            finalMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    tBackground: { value: bgRenderTarget.texture },
                    tMask: { value: maskTexture },
                    uTime: { value: 0.0 }
                },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
                fragmentShader: document.getElementById('inkMaskShader').textContent
            });
            const finalPlane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), finalMaterial);
            finalScene.add(finalPlane);

            // ----------------------------------------------------
            // 5. 인터랙션 이벤트
            // ----------------------------------------------------
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', onPointerDown);
            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('mouseup', onPointerUp);
            document.addEventListener('touchstart', (e)=>{ onPointerDown(e.touches[0]); }, {passive:false});
            document.addEventListener('touchmove', (e)=>{ e.preventDefault(); onPointerMove(e.touches[0]); }, {passive:false});
            document.addEventListener('touchend', onPointerUp);
        }

        // --- 잉크 번짐 시스템 ---
        function addInkDrop(x, y, force = 1.0) {
            document.getElementById('hint').style.opacity = 0;
            // 랜덤 사이즈와 확장 속도를 가진 잉크 방울 생성
            inkDrops.push({
                x: x, y: y,
                radius: 5 * force,
                maxRadius: (80 + Math.random() * 100) * force,
                life: 1.0
            });
        }

        function updateInkCanvas() {
            let needsUpdate = false;
            for (let i = inkDrops.length - 1; i >= 0; i--) {
                let drop = inkDrops[i];
                
                // 그라데이션 브러시 생성 (가운데는 진하고 외곽은 부드럽게)
                let grad = maskCtx.createRadialGradient(drop.x, drop.y, 0, drop.x, drop.y, drop.radius);
                grad.addColorStop(0, `rgba(255, 255, 255, ${drop.life})`);
                grad.addColorStop(0.5, `rgba(255, 255, 255, ${drop.life * 0.5})`);
                grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                
                maskCtx.beginPath();
                maskCtx.fillStyle = grad;
                maskCtx.arc(drop.x, drop.y, drop.radius, 0, Math.PI * 2);
                maskCtx.fill();

                // 속성 업데이트 (퍼지면서 희미해짐)
                drop.radius += (drop.maxRadius - drop.radius) * 0.1; 
                drop.life -= 0.015;

                if (drop.life <= 0) inkDrops.splice(i, 1);
                needsUpdate = true;
            }
            if(needsUpdate) maskTexture.needsUpdate = true; // 중요: GPU로 텍스처 다시 넘김
        }

        function onPointerDown(e) {
            isDrawing = true;
            lastX = e.clientX; lastY = e.clientY;
            addInkDrop(lastX, lastY, 2.0); // 클릭 시 강한 번짐
        }
        function onPointerMove(e) {
            if (!isDrawing) return;
            const dist = Math.hypot(e.clientX - lastX, e.clientY - lastY);
            if (dist > 10) { // 너무 촘촘하게 찍히는 것 방지
                addInkDrop(e.clientX, e.clientY, 0.8 + Math.random()*0.5);
                lastX = e.clientX; lastY = e.clientY;
            }
        }
        function onPointerUp() { isDrawing = false; }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            bgRenderTarget.setSize(window.innerWidth, window.innerHeight);
            blackHoleMaterial.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
            
            // 캔버스 리사이즈 및 타이포그래피 복구 로직 (생략: 기존 그림 유지 위해 리사이즈 비율만 조정)
            let tempCanvas = document.createElement('canvas');
            tempCanvas.width = maskCanvas.width; tempCanvas.height = maskCanvas.height;
            tempCanvas.getContext('2d').drawImage(maskCanvas, 0, 0);
            
            maskCanvas.width = window.innerWidth; maskCanvas.height = window.innerHeight;
            maskCtx.fillStyle = '#000000'; maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
            maskCtx.drawImage(tempCanvas, 0, 0, maskCanvas.width, maskCanvas.height);
            maskTexture.needsUpdate = true;
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // 1. 유니폼 타임 업데이트
            blackHoleMaterial.uniforms.uTime.value = elapsedTime;
            finalMaterial.uniforms.uTime.value = elapsedTime;

            // 2. 캔버스 잉크 번짐 로직 업데이트
            updateInkCanvas();

            // 3. 렌더 파이프라인
            // Step A: 3D 우주(블랙홀)를 보이지 않는 텍스처(bgRenderTarget)에 렌더링
            renderer.setRenderTarget(bgRenderTarget);
            renderer.render(scene, camera);

            // Step B: 화면에 전경 마스킹 쉐이더 렌더링 (우주 텍스처 + 캔버스 잉크 데이터 조합)
            renderer.setRenderTarget(null);
            renderer.render(finalScene, finalCamera);
        }
    </script>
</body>
</html>
