<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Exhibition - teamLab Waterfall Splash</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            background-color: #000000; /* 완전한 어둠 */
            touch-action: none; 
        }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        
        #hint {
            position: fixed; bottom: 5vh; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.4); font-size: 14px; letter-spacing: 8px; font-weight: bold;
            font-family: Arial, sans-serif; z-index: 10; pointer-events: none; transition: opacity 0.5s;
        }
        #error-log { position: fixed; top: 0; left: 0; background: rgba(255,0,0,0.8); color: #fff; z-index: 9999; font-family: monospace; padding: 10px; display: none; pointer-events: none; }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <div id="hint">CLICK TO SPLASH THE WATERFALL</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform vec3 uClickPos;
        uniform float uClickStrength;

        attribute vec3 aRandom; // x: 속도, y: 흔들림, z: 크기
        attribute vec3 aColor;

        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            vec3 pos = position;
            vColor = aColor;
            vAlpha = 1.0;

            // 1. 위에서 아래로 쏟아지는 폭포수
            float fallSpeed = 250.0 + (aRandom.x * 400.0);
            pos.y -= uTime * fallSpeed;

            // 2. 무한 루프 (화면 아래로 가면 위에서 다시 생성)
            pos.y = mod(pos.y + 2000.0, 4000.0) - 2000.0;

            // 3. 미세한 흔들림 (물결 느낌)
            pos.x += sin(uTime * 0.5 + pos.y * 0.005 + aRandom.y * 6.28) * 10.0;

            // 4. 클릭 시 돌에 부딪히는 물보라(Splash) 효과
            float distToClick = distance(pos.xy, uClickPos.xy);
            float effectRadius = 250.0; // 물보라 반경

            if (distToClick < effectRadius && uClickStrength > 0.0) {
                float force = pow(1.0 - (distToClick / effectRadius), 2.0) * uClickStrength;
                
                // 폭포수가 튕겨나가는 방향 (무조건 위로 솟구치게 설계)
                vec3 splashDir = normalize(pos - uClickPos);
                splashDir.y = abs(splashDir.y) + 1.0; // Y축 방향으로 강하게 꺾임
                splashDir.z += 0.5;
                
                pos += splashDir * force * 300.0;
                
                // 물보라가 일 때 하얗게 번쩍임
                vColor = mix(vColor, vec3(1.0, 1.0, 1.0), force);
                vAlpha = 1.0 + force;
            }

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            // 원근감 반영한 크기
            gl_PointSize = aRandom.z * (1000.0 / -mvPosition.z);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            vec2 uv = gl_PointCoord.xy - vec2(0.5);
            
            // X축을 강하게 압축시켜 세로로 얇고 긴 폭포수 형태로 만듦
            uv.x *= 6.0; 
            float dist = length(uv);
            
            if (dist > 0.5) discard;
            
            float glow = pow(1.0 - (dist * 2.0), 1.5);
            gl_FragColor = vec4(vColor, glow * vAlpha * 0.8);
        }
    </script>

    <script>
        window.onerror = function(msg, url, line) {
            let err = document.getElementById('error-log');
            err.style.display = 'block'; err.innerHTML += msg + ' (Line: ' + line + ')<br>';
            return false;
        };

        const clock = new THREE.Clock();
        let scene, camera, renderer;
        let particleMaterial, particleSystem;
        
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        
        // 클릭 상호작용 변수
        let clickPos = new THREE.Vector3(0, -5000, 0); // 화면 밖 초기화
        let targetClickStrength = 0.0;
        let clickStrength = 0.0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            // 배경 안개로 멀리 있는 입자가 어둠에 묻히게 함
            scene.fog = new THREE.FogExp2(0x000000, 0.0003); 

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 4000);
            camera.position.z = 1000;

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 1.0); 
            document.body.appendChild(renderer.domElement);

            // 50만 개의 파티클 생성 (팀랩 수준의 밀도)
            const particleCount = 500000;
            const geometry = new THREE.BufferGeometry();
            
            const positions = new Float32Array(particleCount * 3);
            const randoms = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            // 첨부해주신 이미지(image_48964b, 48966d)의 색상 팔레트
            const colorPalette = [
                new THREE.Color(0x2266ff), // 푸른 폭포수
                new THREE.Color(0x00aaff), // 밝은 시안
                new THREE.Color(0x5500ff), // 딥 퍼플
                new THREE.Color(0xff22aa)  // 마젠타 (꽃/포인트 색상)
            ];

            for (let i = 0; i < particleCount; i++) {
                // 넓은 벽면을 채우도록 배치
                positions[i * 3] = (Math.random() - 0.5) * 4000;     // X
                positions[i * 3 + 1] = (Math.random() - 0.5) * 4000; // Y
                positions[i * 3 + 2] = (Math.random() - 0.5) * 1000; // Z 깊이

                // 속도, 위상, 크기 랜덤
                randoms[i * 3] = Math.random();
                randoms[i * 3 + 1] = Math.random();
                randoms[i * 3 + 2] = 2.0 + Math.random() * 8.0;

                const c = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = c.r;
                colors[i * 3 + 1] = c.g;
                colors[i * 3 + 2] = c.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));
            geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

            // 순수 파티클 쉐이더 매테리얼
            particleMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uClickPos: { value: clickPos },
                    uClickStrength: { value: 0.0 }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true,
                blending: THREE.AdditiveBlending, // 겹치면 밝게 빛남
                depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, particleMaterial);
            scene.add(particleSystem);

            // 이벤트 리스너
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', onPointerDown);
            document.addEventListener('touchstart', (e) => { e.preventDefault(); onPointerDown(e.touches[0]); }, { passive: false });
        }

        // 클릭 시 3D 좌표를 찾아 돌에 부딪힌 듯한 물보라 발생
        function onPointerDown(e) {
            document.getElementById('hint').style.opacity = '0';
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            let plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); // Z=0 평면
            let intersectPoint = new THREE.Vector3();
            
            raycaster.ray.intersectPlane(plane, intersectPoint);
            
            if (intersectPoint) {
                clickPos.copy(intersectPoint);
                clickStrength = 1.0; // 물보라 힘 충전
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // 물보라가 발생했다가 서서히 가라앉음
            if (clickStrength > 0.0) {
                clickStrength -= 0.015; 
                if (clickStrength < 0) clickStrength = 0.0;
            }

            // 쉐이더에 값 업데이트
            particleMaterial.uniforms.uTime.value = elapsedTime;
            particleMaterial.uniforms.uClickPos.value.copy(clickPos);
            particleMaterial.uniforms.uClickStrength.value = clickStrength;

            // 카메라의 아주 미세한 유영
            camera.position.x = Math.sin(elapsedTime * 0.2) * 20;
            camera.position.y = Math.cos(elapsedTime * 0.15) * 20;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
