<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Exhibition - Digital Luminous Falls (teamLab Vibe)</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            /* 전시장의 칠흑 같은 어둠 세팅 */
            background-color: #020204; 
            touch-action: none; 
            font-family: Arial, sans-serif;
            cursor: crosshair;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* 전시 디버깅용 안전 로그 (평소엔 안 보임) */
        #error-log {
            position: fixed; top: 0; left: 0; background: rgba(255,0,0,0.8);
            color: #fff; z-index: 9999; font-family: monospace; padding: 10px; display: none; pointer-events: none;
        }
        
        /* 관람객 유도용 미니멀 텍스트 */
        #exhibition-text {
            position: fixed; bottom: 5vh; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.3); font-size: 14px; letter-spacing: 8px; font-weight: 300;
            z-index: 10; pointer-events: none; mix-blend-mode: screen;
        }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <div id="exhibition-text">TOUCH THE FALLING LIGHT</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="particleVertex" type="x-shader/x-vertex">
        uniform float uTime;
        uniform vec3 uMouse3D;
        uniform float uInteractPower;

        attribute vec3 aRandom; // x: 속도, y: 흔들림 오프셋, z: 크기
        attribute vec3 aColor;

        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            vColor = aColor;
            vec3 pos = position;

            // 1. 낙하 애니메이션 (개별 속도 적용)
            float fallSpeed = 150.0 + aRandom.x * 200.0;
            pos.y -= uTime * fallSpeed;

            // 2. 무한 루프 (화면 아래로 가면 위로 재배치, 전시공간 Y축 기준 -1500 ~ 1500)
            pos.y = mod(pos.y + 1500.0, 3000.0) - 1500.0;

            // 3. 부드러운 흔들림 (바람/물의 저항)
            pos.x += sin(uTime * 0.8 + aRandom.y * 10.0) * 30.0;
            pos.z += cos(uTime * 0.6 + aRandom.x * 10.0) * 30.0;

            // 4. 관람객 인터랙션 (마우스/터치 좌표와의 거리 계산)
            // Z축 뎁스에 따라 반응 반경을 다르게 설정하여 입체적인 파동 생성
            float dist = distance(pos.xy, uMouse3D.xy);
            float radius = 350.0 + (pos.z * 0.2); 

            if (dist < radius && uInteractPower > 0.0) {
                // 중심에서 멀어지는 힘
                float force = pow((radius - dist) / radius, 2.0); 
                vec2 dir = normalize(pos.xy - uMouse3D.xy);
                
                // 팀랩 특유의 유기적인 소용돌이(Swirl) 벡터 생성
                vec2 swirl = vec2(-dir.y, dir.x); 
                
                // 파티클이 밀려나면서 동시에 회전함
                pos.xy += dir * force * 150.0 * uInteractPower;
                pos.xy += swirl * force * 250.0 * uInteractPower;
                pos.z += force * 100.0 * uInteractPower; // 앞으로 살짝 튀어나옴
                
                // 반응한 파티클은 순간적으로 더 밝아짐
                vColor *= 1.0 + force * 1.5; 
            }

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;

            // 원근감에 따른 파티클 크기 조절
            gl_PointSize = aRandom.z * (1200.0 / -mvPosition.z);
            
            // 화면 가장자리 페이드아웃 (위아래 경계선에서 자연스럽게 사라짐)
            vAlpha = smoothstep(1500.0, 1000.0, abs(pos.y)) * smoothstep(1500.0, 1000.0, abs(pos.x));
        }
    </script>

    <script id="particleFragment" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            // 사각형 픽셀을 부드러운 원형으로 깎아냄
            float dist = length(gl_PointCoord - vec2(0.5));
            if (dist > 0.5) discard;

            // 중심은 밝고 외곽은 부드럽게 퍼지는 빛 무리(Glow) 효과
            float intensity = pow(1.0 - (dist * 2.0), 1.5);
            
            gl_FragColor = vec4(vColor, intensity * vAlpha * 0.8);
        }
    </script>

    <script>
        // 안전장치
        window.onerror = function(msg, url, line) {
            let err = document.getElementById('error-log');
            err.style.display = 'block'; err.innerHTML += msg + ' (Line: ' + line + ')<br>';
            return false;
        };

        // --- 전역 변수 ---
        let scene, camera, renderer;
        let particleMaterial, particleSystem;
        
        // 인터랙션 용
        let mouseX = 0, mouseY = 0;
        let targetMouse3D = new THREE.Vector3(0, -5000, 0); // 화면 밖 초기화
        let currentMouse3D = new THREE.Vector3(0, -5000, 0);
        let interactPower = 0.0;
        let isActive = false; // 센서 감지(마우스 인) 여부

        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            // 1. 기본 씬 및 카메라 세팅
            scene = new THREE.Scene();
            // 안개 효과로 멀리 있는 입자가 어둠 속으로 자연스럽게 스며들게 함
            scene.fog = new THREE.FogExp2(0x020204, 0.0003);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 5000);
            camera.position.z = 1000;

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Additive Blending을 위해 ClearColor를 완전히 어둡게 유지
            renderer.setClearColor(0x020204, 1.0); 
            document.body.appendChild(renderer.domElement);

            // 2. 20만 개의 빛의 폭포 (Particles) 생성
            const particleCount = 200000;
            const geometry = new THREE.BufferGeometry();
            
            const positions = new Float32Array(particleCount * 3);
            const randoms = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            // 팀랩 Vibe의 몽환적인 팔레트
            const colorPalette = [
                new THREE.Color(0x00e5ff), // 시안 (Cyan)
                new THREE.Color(0xb400ff), // 마젠타 (Magenta)
                new THREE.Color(0xffaa00), // 웜 골드 (Warm Gold)
                new THREE.Color(0x1133ff)  // 딥 블루 (Deep Blue)
            ];

            for (let i = 0; i < particleCount; i++) {
                // 공간 전체에 흩뿌리기 (X: -1500~1500, Y: -1500~1500, Z: -1000~500)
                positions[i * 3] = (Math.random() - 0.5) * 3000;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 3000;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 1500;

                // 랜덤 속성 (x: 낙하속도 변화, y: 흔들림 위상, z: 파티클 기본 크기)
                randoms[i * 3] = Math.random();
                randoms[i * 3 + 1] = Math.random() * Math.PI * 2;
                randoms[i * 3 + 2] = 2.0 + Math.pow(Math.random(), 4.0) * 15.0; // 소수의 파티클만 아주 크게

                // 색상 할당 (깊이 Z값에 따라 약간의 색상 톤 변화를 주면 더 입체적임)
                const c = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = c.r;
                colors[i * 3 + 1] = c.g;
                colors[i * 3 + 2] = c.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));
            geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

            particleMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uMouse3D: { value: currentMouse3D },
                    uInteractPower: { value: 0.0 }
                },
                vertexShader: document.getElementById('particleVertex').textContent,
                fragmentShader: document.getElementById('particleFragment').textContent,
                transparent: true,
                blending: THREE.AdditiveBlending, // 빛이 겹칠수록 밝아지는 혼합 모드
                depthWrite: false // 파티클 간의 검은 테두리 렌더링 충돌 방지
            });

            particleSystem = new THREE.Points(geometry, particleMaterial);
            scene.add(particleSystem);

            // 3. 이벤트 리스너 (센서 인식 대응)
            window.addEventListener('resize', onWindowResize);
            
            // 실제 전시에서는 이 마우스/터치 이벤트 자리에 키넥트(Kinect)나 라이다(LiDAR) 센서의 
            // 정규화된 좌표(-1.0 ~ 1.0) 데이터를 WebSocket으로 받아와서 연결하면 됩니다.
            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('touchmove', (e) => { e.preventDefault(); onPointerMove(e.touches[0]); }, { passive: false });
            
            document.addEventListener('mouseenter', () => isActive = true);
            document.addEventListener('mouseleave', () => { isActive = false; targetMouse3D.set(0, -5000, 0); });
            document.addEventListener('touchstart', () => isActive = true, { passive: false });
            document.addEventListener('touchend', () => { isActive = false; targetMouse3D.set(0, -5000, 0); });
        }

        // 2D 스크린 좌표를 3D 월드 좌표(Z=0 평면 기준)로 투영
        function onPointerMove(e) {
            isActive = true;
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;

            let vec = new THREE.Vector3(mouseX, mouseY, 0.5);
            vec.unproject(camera);
            let dir = vec.sub(camera.position).normalize();
            let distance = -camera.position.z / dir.z;
            
            targetMouse3D.copy(camera.position).add(dir.multiplyScalar(distance));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // 1. 센서(마우스) 위치와 상호작용 힘을 부드럽게 보간 (Easing)
            currentMouse3D.lerp(targetMouse3D, 0.1);
            
            // 센서 활성화 시 서서히 파워가 차오르고, 나가면 서서히 줄어듦
            const targetPower = isActive ? 1.0 : 0.0;
            interactPower += (targetPower - interactPower) * 0.05;

            // 2. 쉐이더로 데이터 전송
            particleMaterial.uniforms.uTime.value = elapsedTime;
            particleMaterial.uniforms.uMouse3D.value.copy(currentMouse3D);
            particleMaterial.uniforms.uInteractPower.value = interactPower;

            // 3. 카메라 미세 워킹 (관람객이 서 있을 때 벽 자체가 아주 천천히 호흡하는 느낌)
            camera.position.x = Math.sin(elapsedTime * 0.2) * 50;
            camera.position.y = Math.cos(elapsedTime * 0.15) * 50;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
